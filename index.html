<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Smartlife Platform</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0d1b2a;--blue:#2563eb;--blue2:#1d4ed8;--blue-t:rgba(37,99,235,.1);--green:#059669;--green-t:rgba(5,150,105,.1);--amber:#d97706;--amber-t:rgba(217,119,6,.1);--red:#dc2626;--red-t:rgba(220,38,38,.1);--ink:#0f172a;--ink2:#334155;--ink3:#64748b;--ink4:#94a3b8;--bg:#f0f4f8;--card:#fff;--border:#e2e8f0;--border2:#f8fafc;--sw:218px;--font:'IBM Plex Sans',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--ink);font-size:14px}
button,input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:2px}
#loginScreen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--navy);z-index:1000}
.lBg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0,rgba(37,99,235,.22),transparent)}
.lCard{position:relative;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:40px 36px;width:100%;max-width:380px}
.lIcon{width:48px;height:48px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:14px;font-weight:700;color:#fff}
.lH1{color:#fff;font-size:20px;font-weight:700;text-align:center}.lSub{color:rgba(255,255,255,.35);font-size:12px;text-align:center;margin-top:3px;margin-bottom:24px}
.lf{margin-bottom:14px}.lf label{display:block;font-size:10px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.lf input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:11px 14px;font-size:14px;color:#fff;outline:none;transition:.15s}
.lf input:focus{border-color:var(--blue)}.lf input::placeholder{color:rgba(255,255,255,.2)}
.lBtn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.lBtn:hover{background:var(--blue2)}.lBtn:disabled{opacity:.5;cursor:not-allowed}
.lErr{color:#f87171;font-size:12px;margin-top:8px;text-align:center;min-height:18px}
#app{display:none;height:100vh;overflow:hidden}
.layout{display:flex;height:100%}
.sidebar{width:var(--sw);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid rgba(255,255,255,.06)}
.sLogo{padding:16px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:10px}
.sLogoIcon{width:30px;height:30px;background:var(--blue);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.sLogoText{font-size:13px;font-weight:700;color:#fff}.sLogoSub{font-size:9px;color:rgba(255,255,255,.25);font-family:var(--mono)}
.sNav{flex:1;overflow-y:auto;padding:8px;scrollbar-width:none}.sNav::-webkit-scrollbar{display:none}
.sCat{font-size:9px;font-weight:700;color:rgba(255,255,255,.2);text-transform:uppercase;letter-spacing:.9px;padding:10px 8px 4px}
.sItem{padding:8px 10px;border-radius:7px;cursor:pointer;color:rgba(255,255,255,.5);font-size:12px;margin-bottom:1px;transition:.12s;border:1px solid transparent}
.sItem:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.8)}.sItem.act{background:var(--blue-t);color:var(--blue);border-color:rgba(37,99,235,.2);font-weight:500}
.sBottom{padding:10px;border-top:1px solid rgba(255,255,255,.06)}
.sUser{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,.04)}
.sAvatar{width:28px;height:28px;background:var(--blue);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;flex-shrink:0}
.sUserInfo{flex:1;min-width:0}.sUserName{font-size:11px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sUserRole{font-size:9px;color:rgba(255,255,255,.3);margin-top:1px}
.sLogout{background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;font-size:13px;padding:2px;transition:.12s}.sLogout:hover{color:rgba(255,255,255,.7)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:52px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
.topbarTitle{font-size:15px;font-weight:700;flex:1}.topbarRight{display:flex;align-items:center;gap:8px}
.content{flex:1;overflow-y:auto;padding:20px}
.btn{display:inline-flex;align-items:center;gap:5px;background:none;border:1px solid var(--border);border-radius:7px;padding:5px 12px;font-size:11px;font-weight:600;color:var(--ink2);cursor:pointer;transition:.12s;white-space:nowrap}
.btn:hover{background:var(--bg)}.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}.btn.primary:hover{background:var(--blue2)}
.btn.success{background:var(--green);color:#fff;border-color:var(--green)}.btn.danger{background:var(--red);color:#fff;border-color:var(--red)}.btn.sm{padding:3px 8px;font-size:10px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:14px;overflow:hidden}
.cardH{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.cardH h3{font-size:13px;font-weight:700;flex:1}.cardH .hint{font-size:11px;color:var(--ink3)}.cardB{padding:16px}
.kpiGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px 15px}
.kpiL{font-size:10px;color:var(--ink3);font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.kpiV{font-size:20px;font-weight:700;letter-spacing:-.5px;line-height:1;font-family:var(--mono)}.kpiS{font-size:11px;color:var(--ink4);margin-top:4px}
.kpi.blue .kpiV{color:var(--blue)}.kpi.green .kpiV{color:var(--green)}.kpi.amber .kpiV{color:var(--amber)}.kpi.red .kpiV{color:var(--red)}
.tWrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--bg);padding:7px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--ink3);border-bottom:1px solid var(--border);white-space:nowrap;text-transform:uppercase;letter-spacing:.4px}
td{padding:8px 10px;border-bottom:1px solid var(--border2);vertical-align:middle}
tr:last-child td{border-bottom:none}tr:hover td{background:#fafbfd}
.tFoot td{font-weight:700;background:var(--bg);border-top:2px solid var(--border)}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600}
.badge-blue{background:var(--blue-t);color:var(--blue)}.badge-green{background:var(--green-t);color:var(--green)}
.badge-amber{background:var(--amber-t);color:var(--amber)}.badge-red{background:var(--red-t);color:var(--red)}.badge-gray{background:var(--bg);color:var(--ink3)}
.fRow{display:grid;gap:12px;margin-bottom:14px}.fRow.c2{grid-template-columns:1fr 1fr}.fRow.c3{grid-template-columns:1fr 1fr 1fr}
.fG{display:flex;flex-direction:column;gap:5px}.fG label{font-size:11px;font-weight:600;color:var(--ink2)}
.fG input,.fG select,.fG textarea{border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;outline:none;background:var(--card);transition:.12s}
.fG input:focus,.fG select:focus,.fG textarea:focus{border-color:var(--blue)}
.pInput{border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;outline:none;background:var(--card);transition:.12s;width:100%}
.pInput:focus{border-color:var(--blue)}
.iEdit{background:transparent;border:1px solid transparent;border-radius:5px;padding:3px 6px;font-size:12px;font-family:var(--mono);width:70px;text-align:right;transition:.12s}
.iEdit:hover{border-color:var(--border);background:var(--bg)}.iEdit:focus{border-color:var(--blue);background:var(--card);outline:none}
.prog{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progFill{height:100%;border-radius:3px;transition:width .35s}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;padding:16px}
.modal.open{display:flex}
.mBox{background:var(--card);border-radius:16px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.18)}
.mH{padding:15px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;position:sticky;top:0;background:var(--card);z-index:1}
.mH h3{font-size:14px;font-weight:700;flex:1}.mH .mX{background:none;border:none;font-size:16px;cursor:pointer;color:var(--ink3)}.mH .mX:hover{color:var(--ink)}.mB{padding:20px}
.mF{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--card)}
.bn{border-left:3px solid var(--amber);background:var(--amber-t);border-radius:8px;padding:10px 14px;margin-bottom:8px}
.bn.red{border-color:var(--red);background:var(--red-t)}.bn.green{border-color:var(--green);background:var(--green-t)}
.bnT{font-size:12px;font-weight:700;margin-bottom:2px}.bnS{font-size:11px;color:var(--ink3)}
.wBar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(37,99,235,.04);border:1px dashed rgba(37,99,235,.25);border-radius:10px;margin-bottom:12px}
#sellerView{display:none;background:var(--navy);min-height:100vh;padding:20px;color:#fff}
/* SIDEBAR FONT SIZE */
.sItem{font-size:13px;font-weight:500;padding:9px 12px}
.sCat{font-size:10px}

/* BURGER */
.burgerBtn{display:none;background:none;border:none;font-size:22px;cursor:pointer;color:var(--ink2);padding:4px 8px;margin-right:4px;line-height:1}

/* OVERLAY */
#sidebarOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
#sidebarOverlay.show{display:block}

@media(max-width:768px){
  .burgerBtn{display:flex;align-items:center}
  .sidebar{position:fixed;left:0;top:0;height:100%;z-index:100;transform:translateX(-100%);transition:transform .25s ease;width:240px}
  .sidebar.mobileOpen{transform:translateX(0)}
  .main{width:100%}
  .kpiGrid{grid-template-columns:1fr 1fr}
  .fRow.c3{grid-template-columns:1fr 1fr}
  .content{padding:12px}
  .topbarTitle{font-size:13px}
  table{font-size:11px}
  th{padding:5px 7px}
  td{padding:6px 7px}
}
</style>
</head>
<body>
<div id="loginScreen" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0d1b2a;z-index:1000">
  <div class="lBg"></div>
  <div class="lCard">
    <div class="lIcon">SL</div>
    <div class="lH1">Smartlife Platform</div>
    <div class="lSub">Biznes boshqaruv tizimi v2.0</div>
    <div class="lf"><label>Email</label><input id="lEmail" type="email" placeholder="admin@smartlife.uz" autocomplete="email"></div>
    <div class="lf"><label>PIN-kod</label><input id="lPin" type="password" placeholder="••••••" maxlength="20"></div>
    <button class="lBtn" id="lBtn" onclick="doLogin()">Kirish</button>
    <div class="lErr" id="lErr"></div>
  </div>
</div>
<div id="app" style="display:none">
  <div class="layout">
    <div class="sidebar">
      <div class="sLogo"><div class="sLogoIcon">SL</div><div><div class="sLogoText">Smartlife</div><div class="sLogoSub">Biznes Platforma v2.0</div></div></div>
      <nav class="sNav" id="sNav"></nav>
      <div class="sBottom"><div class="sUser">
        <div class="sAvatar" id="sAvatar">A</div>
        <div class="sUserInfo"><div class="sUserName" id="sUserName">—</div><div class="sUserRole" id="sUserRole">—</div></div>
        <button class="sLogout" onclick="doLogout()">✕</button>
      </div></div>
    </div>
    <div class="main">
      <div class="topbar"><button class="burgerBtn" id="burgerBtn" onclick="toggleSidebar()">☰</button><div class="topbarTitle" id="topbarTitle">—</div><div class="topbarRight" id="topbarRight"></div></div>
      <div class="content" id="content"></div>
    </div>
  </div>
</div>
<div id="sellerView" style="display:none"></div>
<div id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="modal" id="M_user"><div class="mBox"><div class="mH"><h3 id="M_user_title">—</h3><button class="mX" onclick="closeM('M_user')">✕</button></div><div class="mB" id="M_user_body"></div><div class="mF" id="M_user_foot"></div></div></div>
<div class="modal" id="M_task"><div class="mBox">
  <div class="mH"><h3>Задача</h3><button class="mX" onclick="closeM('M_task')">✕</button></div>
  <div class="mB">
    <div class="fG" style="margin-bottom:12px"><label>Название</label><input id="tTitle"></div>
    <div class="fG" style="margin-bottom:12px"><label>Описание</label><textarea id="tDesc" rows="2" style="resize:vertical"></textarea></div>
    <div class="fRow c2"><div class="fG"><label>Кому</label><select id="tAssign"></select></div><div class="fG"><label>Раздел</label><select id="tSect"><option value="general">Общая</option><option value="sales">Продажи</option><option value="marketing">Маркетинг</option><option value="finance">Финансы</option><option value="target">Цель</option></select></div></div>
    <div class="fRow c2" style="margin-top:12px"><div class="fG"><label>Приоритет</label><select id="tPrio"><option value="high">Высокий</option><option value="medium" selected>Средний</option><option value="low">Низкий</option></select></div><div class="fG"><label>Дедлайн</label><input id="tDue" type="date"></div></div>
  </div>
  <div class="mF"><button class="btn" onclick="closeM('M_task')">Отмена</button><button class="btn primary" onclick="saveTask()">Сохранить</button></div>
</div></div>
<div class="modal" id="M_wish"><div class="mBox">
  <div class="mH"><h3>Цель и мотивация</h3><button class="mX" onclick="closeM('M_wish')">✕</button></div>
  <div class="mB">
    <div class="fG" style="margin-bottom:12px"><label>Сотрудник</label><input id="wsName" readonly style="background:var(--bg)"></div>
    <div class="fRow c2"><div class="fG"><label>Желаемый бонус ($)</label><input id="wsBonus" type="number" min="0" step="50"></div><div class="fG"><label>Месяц</label><input id="wsMonth" type="month"></div></div>
    <div class="fG" style="margin-top:12px"><label>Мечта (что хочет при выполнении плана)</label><textarea id="wsWish" rows="3" style="resize:vertical" placeholder="Купить машину, поехать в отпуск..."></textarea></div>
  </div>
  <div class="mF"><button class="btn" onclick="closeM('M_wish')">Отмена</button><button class="btn primary" onclick="saveWish()">Сохранить</button></div>
</div></div>
<div class="modal" id="M_coll"><div class="mBox">
  <div class="mH"><h3 id="M_coll_title">Должник</h3><button class="mX" onclick="closeM('M_coll')">✕</button></div>
  <div class="mB">
    <div class="fRow c2"><div class="fG"><label>Клиент</label><input id="clName"></div><div class="fG"><label>Телефон</label><input id="clPhone"></div></div>
    <div class="fRow c2"><div class="fG"><label>Филиал</label><select id="clBranch"></select></div><div class="fG"><label>Дата договора</label><input id="clDate" type="date"></div></div>
    <div class="fRow c3"><div class="fG"><label>Долг $</label><input id="clDebt" type="number"></div><div class="fG"><label>Оплачено $</label><input id="clPaid" type="number"></div><div class="fG"><label>Дней просрочки</label><input id="clDays" type="number"></div></div>
    <div class="fRow c2" style="margin-top:4px"><div class="fG"><label>Следующий контакт</label><input id="clNext" type="date"></div><div class="fG"><label>Коллектор</label><select id="clColl"></select></div></div>
    <div class="fG" style="margin-top:8px"><label>Примечание</label><textarea id="clNotes" rows="2" style="resize:vertical"></textarea></div>
  </div>
  <div class="mF"><button class="btn" onclick="closeM('M_coll')">Отмена</button><button class="btn primary" onclick="saveColl()">Сохранить</button></div>
</div></div>
<div class="modal" id="M_recur"><div class="mBox" style="max-width:560px">
  <div class="mH"><h3>Qaytalanadigan vazifa</h3><button class="mX" onclick="closeM('M_recur')">✕</button></div>
  <div class="mB">
    <div class="fG" style="margin-bottom:12px"><label>Vazifa nomi</label><input id="rTitle" placeholder="Masalan: Lidlarga qo'ng'iroq qilish"></div>
    <div class="fG" style="margin-bottom:12px"><label>Tavsif</label><textarea id="rDesc" rows="2" style="resize:vertical"></textarea></div>
    <div class="fRow c3">
      <div class="fG"><label>Bajaruvchi</label><select id="rAssign"></select></div>
      <div class="fG"><label>Bo'lim</label><select id="rSect">
        <option value="general">Umumiy</option>
        <option value="callcenter">Koll-markaz</option>
        <option value="sales">Sotuvlar</option>
        <option value="target">Maqsad</option>
      </select></div>
      <div class="fG"><label>Muhimlik</label><select id="rPrio">
        <option value="high">Yuqori</option>
        <option value="medium" selected>O'rta</option>
        <option value="low">Past</option>
      </select></div>
    </div>
    <div class="fRow c2" style="margin-top:12px">
      <div class="fG"><label>Takrorlash</label><select id="rFreq">
        <option value="daily">Har kuni</option>
        <option value="weekdays">Har kuni (DU-JU)</option>
        <option value="weekly">Har hafta</option>
        <option value="monthly">Har oy</option>
      </select></div>
      <div class="fG"><label>Boshlash sanasi</label><input id="rStart" type="date"></div>
    </div>
    <div class="fG" style="margin-top:12px"><label>Tugash sanasi (ixtiyoriy)</label><input id="rEnd" type="date"></div>
  </div>
  <div class="mF"><button class="btn" onclick="closeM('M_recur')">Bekor</button><button class="btn primary" onclick="saveRecurring()">Yaratish</button></div>
</div></div>

<div class="modal" id="M_tgpreview"><div class="mBox" style="max-width:680px">
  <div class="mH"><h3>Telegram — Yuborishdan oldin tekshirish</h3><button class="mX" onclick="closeM('M_tgpreview')">✕</button></div>
  <div class="mB" id="tgPreviewBody" style="max-height:60vh;overflow-y:auto"></div>
  <div class="mF">
    <button class="btn" onclick="closeM('M_tgpreview')">Bekor</button>
    <button class="btn success" onclick="confirmSendTg()">Hammaga yuborish</button>
  </div>
</div></div>

<div class="modal" id="M_ai"><div class="mBox" style="max-width:640px">
  <div class="mH">
    <h3>AI Tahlilchi</h3>
    <span style="font-size:10px;background:var(--blue-t);color:var(--blue);padding:2px 8px;border-radius:10px;margin-left:8px">Claude</span>
    <button class="mX" onclick="closeM('M_ai')" style="margin-left:auto">✕</button>
  </div>
  <div class="mB">
    <div id="aiChat" style="min-height:200px;max-height:50vh;overflow-y:auto;display:flex;flex-direction:column;gap:10px;margin-bottom:12px"></div>
    <div style="display:flex;gap:8px">
      <input id="aiInput" placeholder="Savol bering: Qaysi filial yaxshi ishlayapti? Bottleneck nima?..."
        style="flex:1;border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;outline:none"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAiMsg();}">
      <button class="btn primary" onclick="sendAiMsg()">Yuborish</button>
    </div>
    <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px">
      <button class="btn sm" onclick="askAi('Qaysi filial eng yaxshi ishlayapti?')">Eng yaxshi filial?</button>
      <button class="btn sm" onclick="askAi('Asosiy muammolar nima?')">Muammolar?</button>
      <button class="btn sm" onclick="askAi('Qaysi oyda sotuvchi olish kerak?')">Sotuvchi kerakmi?</button>
      <button class="btn sm" onclick="askAi('Marketingni qanday yaxshilash mumkin?')">Marketing tavsiya</button>
    </div>
  </div>
</div></div>

async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function doLogin() {
  const email = document.getElementById('lEmail').value.trim().toLowerCase();
  const pin   = document.getElementById('lPin').value.trim();
  const btn   = document.getElementById('lBtn');
  const err   = document.getElementById('lErr');
  if (!email||!pin){err.textContent='Введите email и PIN';return;}
  btn.disabled=true; btn.textContent='Вход...'; err.textContent='';
  try {
    const hash = await sha256(pin);
    const {data,error} = await APP.db.from('sl_users').select('*').eq('email',email).eq('pin_hash',hash).eq('active',true).single();
    if (error||!data) throw new Error('Неверный email или PIN');
    sessionStorage.setItem('sl_user', JSON.stringify(data));
    sessionStorage.setItem('sl_ver', 'sl_v2');
    await startApp(data);
  } catch(e) { err.textContent=e.message||'Ошибка'; btn.disabled=false; btn.textContent='Войти'; }
}
function doLogout(){ sessionStorage.removeItem('sl_user'); location.reload(); }

async function startApp(user) {
  APP.user = user;

    document.getElementById('sellerView').style.display='block';

  document.getElementById('sUserName').textContent = user.full_name||user.email;

  // Generate recurring tasks for today on login
  generateRecurringTasks().catch(e=>console.log('recurring:',e));
  scheduleAutoTg(); // auto TG at 9:00 if enabled
  loadSection('strategy');
}
async function loadBase() {
  const db = APP.db;
  const [pR,bR,mR,tR,uR] = await Promise.all([
    db.from('sl_params').select('*'),
    db.from('sl_branches').select('*').order('id'),
    db.from('sl_models').select('*'),
    db.from('sl_team').select('*').order('full_name'),
    db.from('sl_users').select('*')
  ]);
  APP.params   = Object.fromEntries((pR.data||[]).map(r=>[r.key,r.value]));
  const allBranches = bR.data||[];
  // inactive_branches = JSON array of branch IDs excluded from plan
  let inactiveBranches=[];
  try{inactiveBranches=JSON.parse(APP.params.inactive_branches||'[]').map(String);}catch(e){}
  APP.branches = allBranches.filter(b=>!inactiveBranches.includes(String(b.id)));
  APP.allBranches = allBranches; // keep full list for toggle UI
  APP.models = mR.data||[];
  APP.team   = tR.data||[];
  APP.users  = uR.data||[];
  const start = APP.params.start_month||'2026-05';
  const count = parseInt(APP.params.plan_months||3);
  APP.months=[]; let [yr,mo]=start.split('-').map(Number);
  for(let i=0;i<count;i++){APP.months.push(`${yr}-${String(mo).padStart(2,'0')}`);mo++;if(mo>12){mo=1;yr++;}}
  if(!APP.currentMonth||!APP.months.includes(APP.currentMonth)) APP.currentMonth=APP.months[0]||yyyymm();
  // Load monthly bonuses from params (bonus_YYYY-MM keys)
  APP.monthlyBonuses={};
  APP.months.forEach(m=>{
    try{APP.monthlyBonuses[m]=parseFloat(APP.params['bonus_'+m]||0);}catch(e){APP.monthlyBonuses[m]=0;}
  });
  // Also sync bonuses from sl_tasks if params are missing
  await syncBonusesFromTasks();
}

async function syncBonusesFromTasks(){
  // For each month, sum up bonuses from sl_tasks section='target'
  for(const mo of APP.months){
    if(parseFloat(APP.params['bonus_'+mo]||0)>0) continue; // already set
    try{
      const {data}=await APP.db.from('sl_tasks').select('description').eq('section','target').eq('month',mo);
      if(!data||!data.length) continue;
      let total=0;
      data.forEach(w=>{try{total+=parseFloat(JSON.parse(w.description||'{}').bonus||0);}catch(e){}});
      if(total>0){
        APP.params['bonus_'+mo]=String(total);
        APP.monthlyBonuses[mo]=total;
        // Save to params silently
        await APP.db.from('sl_params').upsert({key:'bonus_'+mo,value:String(total),updated_at:new Date().toISOString(),updated_by:'system'},{onConflict:'key'});
      }
    }catch(e){}
  }
}

// ════════════════════════════════════════════════
// CORE CALC ENGINE
// ════════════════════════════════════════════════
function runCalc() {
  const p=APP.params;
  const targetProfit  = parseFloat(p.target_profit||500000);
  const targetMargin  = parseFloat(p.target_margin||10);
  const planMonths    = parseInt  (p.plan_months||3);
  const avgCheck      = parseFloat(p.avg_check||1200);
  const grossMargin   = parseFloat(p.gross_margin||11);
  const mktBudget     = parseFloat(p.mkt_budget||12000);
  const cpl           = parseFloat(p.cpl||0.86);
  const convQuality   = parseFloat(p.conv_quality||50);
  const convSale      = parseFloat(p.conv_sale||30);
  const organicLeads  = parseInt  (p.organic_leads||1000);
  const installPct    = parseFloat(p.install_pct||50);
  const installMonths = parseInt  (p.install_months||6);
  const badDebtPct    = parseFloat(p.bad_debt_pct||3);
  const otherOpex     = parseFloat(p.other_opex||5000);
  // Per-month bonuses — each month has its own bonus total
  // bonusRev per month = that month's bonus / margin
  // For base calc (KPI display), use average or current month bonus
  const curMo = APP.currentMonth || APP.months[0] || yyyymm();
  const totalBonuses = parseFloat(APP.params['bonus_'+curMo]||0);
  const baseRev  = targetProfit/(targetMargin/100);
  const bonusRev = totalBonuses/(targetMargin/100);
  const netRev   = baseRev + bonusRev;
  // New funnel: leads → visit (conv_visit%) → buy (conv_buy%)
  const convVisit  = parseFloat(p.conv_visit||8);
  const convBuy    = parseFloat(p.conv_buy||80);
  const convRate   = (convVisit/100)*(convBuy/100);
  const units      = Math.ceil(netRev/avgCheck);
  const totalLeads = convRate>0?Math.ceil(units/convRate):0;
  const storeVisits= Math.ceil(totalLeads*(convVisit/100));
  const paidLeads  = cpl>0?Math.ceil(mktBudget/cpl):0;
  const neededPaid = Math.max(0,totalLeads-organicLeads);
  // Per-month margin/check overrides
  let monthMargins=[],monthChecks=[];
  try{monthMargins=JSON.parse(p.month_margins||'[]');}catch(e){}
  try{monthChecks=JSON.parse(p.month_checks||'[]');}catch(e){}
  while(monthMargins.length<planMonths) monthMargins.push(null);
  while(monthChecks.length<planMonths)  monthChecks.push(null);
  const totalWeight = APP.branches.reduce((s,b)=>s+parseFloat(b.weight||1),0);
  const totalFOT    = APP.team.reduce((s,t)=>s+parseFloat(t.salary_usd||0),0);
  const totalRent   = APP.branches.reduce((s,b)=>s+parseFloat(b.rent_usd||0),0);
  let growthRates=[];
  try{growthRates=JSON.parse(p.month_growth||'[]');}catch(e){}
  while(growthRates.length<planMonths) growthRates.push(1);
  growthRates=growthRates.slice(0,planMonths);
  // growthPcts: each month = % of target (last = 100)
  let growthPcts2 = growthRates.slice(0, planMonths);
  while (growthPcts2.length < planMonths) growthPcts2.push(100);
  growthPcts2[planMonths-1] = 100;
  const normRates = growthPcts2.map(v => parseFloat(v||100)/100);
  return {targetProfit,targetMargin,planMonths,avgCheck,grossMargin,mktBudget,cpl,convQuality,convSale,convVisit,convBuy,organicLeads,installPct,installMonths,badDebtPct,otherOpex,netRev,baseRev,bonusRev,units,convRate,totalLeads,storeVisits,paidLeads,neededPaid,totalWeight,totalFOT,totalRent,normRates,growthRates,growthPcts:growthPcts2,totalBonuses,monthMargins,monthChecks};
}
function bmp(branch,c,idx) {
  const share=parseFloat(branch.weight||1)/(c.totalWeight||1);
  const mPct=(c.normRates[idx]||1);
  const mMargin = parseFloat(c.monthMargins[idx]||c.targetMargin);
  const mCheck  = parseFloat(c.monthChecks[idx]||c.avgCheck);
  const monthProfit = c.targetProfit * mPct * share;
  // Per-month bonus for this month
  const mo = APP.months[idx]||APP.currentMonth||yyyymm();
  const mBonus = parseFloat(APP.params['bonus_'+mo]||0);
  const mBonusShare = mBonus * share / (mMargin/100); // extra rev needed for bonus
  const rev = monthProfit / (mMargin/100) + mBonusShare;
  const units = Math.ceil(rev/mCheck);
  const leads = c.convRate>0?Math.ceil(units/c.convRate):0;
  const visits = Math.ceil(leads*(c.convVisit/100));
  return{rev,units,leads,visits,profit:monthProfit,mkt:c.mktBudget*share*mPct,margin:mMargin,check:mCheck};
}

async function saveMonthOverride(key,idx,val){
  let arr=[];try{arr=JSON.parse(APP.params[key]||'[]');}catch(e){}
  while(arr.length<=idx) arr.push(null);
  arr[idx]=val===''||val===null?null:parseFloat(val);
  APP.params[key]=JSON.stringify(arr);
  await APP.db.from('sl_params').upsert({key,value:JSON.stringify(arr),updated_at:new Date().toISOString(),updated_by:APP.user?.email||''},{onConflict:'key'});
  // Reload calc without full page reload for smoothness
  loadSection('strategy');
}

async function updateGrowth(i,v){let r=[];try{r=JSON.parse(APP.params.month_growth||'[]');}catch(e){}while(r.length<=APP.months.length)r.push(100);r[i]=Math.min(100,Math.max(1,parseFloat(v)||10));r[APP.months.length-1]=100;await saveP('month_growth',JSON.stringify(r));}
async function updW(id,v){const val=parseFloat(v)||0.25;await APP.db.from('sl_branches').update({weight:val}).eq('id',id);const b=APP.branches.find(x=>x.id===id);if(b)b.weight=val;loadSection(APP.currentSection);}
function bottlenecks(c){
  const bns=[];
  if(c.convRate<0.1) bns.push({lvl:'red',t:`Критически низкая конверсия: ${(c.convRate*100).toFixed(1)}%`,d:`Норма 15%+. Проверьте качество лидов и навыки продавцов`});
  if(c.neededPaid>c.paidLeads) bns.push({lvl:'amber',t:`Дефицит лидов: нужно ${fmt(c.neededPaid)} платных, маркетинг даёт ${fmt(c.paidLeads)}`,d:`Увеличьте бюджет или снизьте CPL`});
  if(c.targetMargin<8) bns.push({lvl:'amber',t:`Маржа ${c.targetMargin}% — ниже нормы (рек. 10%+)`,d:`Оптимизируйте структуру расходов`});
  if(c.totalFOT/c.netRev>0.15) bns.push({lvl:'amber',t:`ФОТ ${(c.totalFOT/c.netRev*100).toFixed(1)}% от выручки (норма до 12%)`,d:`Оптимизируйте структуру команды`});
  if(!bns.length) bns.push({lvl:'green',t:'Barcha ko\'rsatkichlar me\'yorda',d:'Muammoli joy topilmadi. Bajarishga e\'tibor qarating.'});
  return bns;
}

async function saveWish(){
  const email=document.getElementById('wsWish').dataset.email;
  const teamId=document.getElementById('wsWish').dataset.team;
  const bonus=parseFloat(document.getElementById('wsBonus').value)||0;
  const wish=document.getElementById('wsWish').value.trim();
  const mo=document.getElementById('wsMonth').value;

  // Don't save to sl_team.bonus_wish — use per-month sl_tasks only
  // (removing this avoids all months showing same bonus)

  // Save wish+bonus to sl_tasks (section='target')
  const desc=JSON.stringify({wish,bonus});
  const {data:ex}=await APP.db.from('sl_tasks').select('id').eq('section','target').eq('assigned_to',email).eq('month',mo).maybeSingle();
  if(ex?.id){await APP.db.from('sl_tasks').update({description:desc,updated_at:new Date().toISOString()}).eq('id',ex.id);}
  else{await APP.db.from('sl_tasks').insert({title:'Maqsad '+mo,description:desc,section:'target',month:mo,assigned_to:email,assigned_by:APP.user.email,status:'pending'});}

  // Recalculate total bonus for this month across all team members
  // Load all target tasks for this month
  const {data:allWishes}=await APP.db.from('sl_tasks').select('description').eq('section','target').eq('month',mo);
  let totalBonus=0;
  (allWishes||[]).forEach(w=>{try{totalBonus+=parseFloat(JSON.parse(w.description||'{}').bonus||0);}catch(e){}});
  // Save total to params so runCalc can use it
  await saveP('bonus_'+mo, String(totalBonus));

  closeM('M_wish');
  // Refresh monthly bonuses in memory
  APP.monthlyBonuses[mo]=totalBonus;
  APP.params['bonus_'+mo]=String(totalBonus);
  loadSection('team');
}

async function saveRecurring(){
  const rule={
    title:document.getElementById('rTitle').value.trim(),
    desc:document.getElementById('rDesc').value.trim(),
    assigned_to:document.getElementById('rAssign').value,
    section:document.getElementById('rSect').value,
    priority:document.getElementById('rPrio').value,
    freq:document.getElementById('rFreq').value,
    start:document.getElementById('rStart').value,
    end:document.getElementById('rEnd').value||null,
    active:true,
    created_by:APP.user.email,
    created_at:new Date().toISOString()
  };
  if(!rule.title){alert('Vazifa nomini kiriting');return;}
  let rules=[];
  try{rules=JSON.parse(APP.params.recurring_tasks||'[]');}catch(e){}
  rule.id='r_'+Date.now();
  rules.push(rule);
  await saveP('recurring_tasks',JSON.stringify(rules));
  closeM('M_recur');
  // Generate tasks for today immediately
  await generateRecurringTasks();
  alert('Qaytalanadigan vazifa yaratildi!');
  loadSection(APP.currentSection);
}

async function generateRecurringTasks(){
  let rules=[];
  try{rules=JSON.parse(APP.params.recurring_tasks||'[]');}catch(e){return;}
  if(!rules.length) return;
  const today=new Date().toISOString().slice(0,10);
  const todayDate=new Date(today);
  const dow=todayDate.getDay(); // 0=Sun,1=Mon...5=Fri,6=Sat

  for(const rule of rules){
    if(!rule.active) continue;
    if(rule.start>today) continue;
    if(rule.end&&rule.end<today) continue;

    // Check frequency
    let shouldCreate=false;
    if(rule.freq==='daily') shouldCreate=true;
    else if(rule.freq==='weekdays') shouldCreate=dow>=1&&dow<=5;
    else if(rule.freq==='weekly') shouldCreate=dow===1; // Monday
    else if(rule.freq==='monthly') shouldCreate=todayDate.getDate()===1;

    if(!shouldCreate) continue;

    // Check if already created today
    const {data:existing}=await APP.db.from('sl_tasks')
      .select('id').eq('title',rule.title).eq('assigned_to',rule.assigned_to)
      .eq('due_date',today).eq('section',rule.section);
    if(existing&&existing.length>0) continue;

    // Create task
    await APP.db.from('sl_tasks').insert({
      title:rule.title,
      description:rule.desc||'',
      assigned_to:rule.assigned_to,
      assigned_by:rule.created_by||'system',
      section:rule.section,
      priority:rule.priority||'medium',
      due_date:today,
      month:today.slice(0,7),
      status:'pending'
    });
  }
}

async function renderLeaderboard(){
  const c=runCalc(); const mo=APP.currentMonth;
  const {data:sls}=await APP.db.from('sl_sales').select('*').gte('date',mo+'-01').lte('date',mo+'-31');
  const sales=sls||[];
  const moIdx=APP.months.indexOf(mo);

  // Branch ranking
  const branchRank=APP.branches.map(b=>{
    const bp=bmp(b,c,moIdx>=0?moIdx:0);
    const fact=sales.filter(s=>s.branch_id===b.id).reduce((s,x)=>s+parseFloat(x.unit_price||0)*parseInt(x.qty||1),0);
    const units=sales.filter(s=>s.branch_id===b.id).reduce((s,x)=>s+parseInt(x.qty||1),0);
    const pct=bp.rev>0?Math.round(fact/bp.rev*100):0;
    return{b,fact,units,plan:bp.rev,pct};

  const outQ=parseInt(document.getElementById('invOut').value)||0;

  document.getElementById('invTotal').value=Math.round((inQ-outQ)*cost);
}

    date:document.getElementById('invDate').value,

    model_id:document.getElementById('invModel').value,
    qty_in:inQ,qty_out:outQ,qty_balance:inQ-outQ,

}

function scheduleAutoTg(){
  const TG_AUTO_KEY='tg_auto_enabled';
  if(APP.params[TG_AUTO_KEY]!=='true') return;
  const now=new Date();
  const next=new Date();
  next.setHours(9,0,0,0);
  if(now>next) next.setDate(next.getDate()+1);
  const ms=next-now;
  console.log(`Auto TG: ${Math.round(ms/60000)} daqiqadan keyin`);
  setTimeout(async()=>{
    const sentKey='tg_sent_'+new Date().toISOString().slice(0,10);
    if(APP.params[sentKey]==='true') return;
    await sendTaskNotificationsToAll('daily');
    await saveP(sentKey,'true');
    scheduleAutoTg(); // schedule next day
  },ms);
}

async function toggleAutoTg(){
  const cur=APP.params.tg_auto_enabled==='true';
  await saveP('tg_auto_enabled',cur?'false':'true');
  if(!cur) scheduleAutoTg();
  alert(cur?'Avtomatik TG o\'chirildi':'Avtomatik TG yoqildi! Har kuni soat 9:00 da yuboriladi.');
}

async function sendTgMsg(chatId,text){
  const token=APP.params.tg_bot_token;
  if(!token||token.length<10){alert('Настройте tg_bot_token в Настройках → Системные параметры');return false;}
  const r=await fetch(`https://api.telegram.org/bot${token}/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:chatId,text,parse_mode:'HTML'})});
  const res=await r.json(); return res.ok;
}
async function sendTgTo(tgId,name,mo){
  const c=runCalc();
  const t=APP.team.find(x=>String(x.telegram_id)===String(tgId));
  const br=APP.branches.find(b=>b.id===t?.branch_id);
  const plan=br?bmp(br,c,APP.months.indexOf(mo)>=0?APP.months.indexOf(mo):0):{rev:0,units:0};

  const ok=await sendTgMsg(tgId,msg);

}

async function sendTaskNotificationsToAll(freq='daily'){
  const today=new Date().toISOString().slice(0,10);
  const todayDate=new Date(today);
  const dow=todayDate.getDay();
  const isMonday=dow===1;
  const isFirst=todayDate.getDate()===1;
  let sent=0,failed=0,skipped=0;
  for(const member of APP.team){
    if(!member.telegram_id){skipped++;continue;}
    const {data:todayTasks}=await APP.db.from('sl_tasks').select('*').eq('assigned_to',member.email).eq('due_date',today).eq('status','pending');
    let weekTasks=[],monthTasks=[];
    if(isMonday){const r=await APP.db.from('sl_tasks').select('*').eq('assigned_to',member.email).gte('due_date',today).lte('due_date',addDays(today,6)).eq('status','pending');weekTasks=r.data||[];}
    if(isFirst){const r=await APP.db.from('sl_tasks').select('*').eq('assigned_to',member.email).eq('month',today.slice(0,7)).eq('status','pending');monthTasks=r.data||[];}
    const c=runCalc();
    const br=APP.branches.find(b=>b.id===member.branch_id);
    const moIdx=APP.months.indexOf(APP.currentMonth);
    const plan=br?bmp(br,c,moIdx>=0?moIdx:0):{rev:0,units:0};
    const staffCount=parseInt(br?.staff_count||1);
    const myPlan=plan.rev/staffCount;
    const dayPlanAmt=myPlan/26;
    const lines=[];
    lines.push(`<b>Smartlife — Salom, ${member.full_name.split(' ')[0]}!</b>`);
    lines.push(`Sana: ${today}`);
    lines.push('');
    if(br){
      lines.push(`Bugungi sotuv rejasi: <b>$${Math.round(dayPlanAmt).toLocaleString('ru-RU')}</b>`);
      lines.push(`Oylik reja: $${Math.round(myPlan).toLocaleString('ru-RU')}`);
      lines.push('');
    }
    if((todayTasks||[]).length){
      lines.push(`Bugungi vazifalar (${(todayTasks||[]).length} ta):`);
      (todayTasks||[]).slice(0,5).forEach((t,i)=>lines.push(`${i+1}. ${t.title}`));
      lines.push('');
    } else {
      lines.push('Bugun vazifa yoq');
      lines.push('');
    }
    if(isMonday&&weekTasks.length){
      lines.push(`Haftalik vazifalar (${weekTasks.length} ta):`);
      weekTasks.slice(0,5).forEach((t,i)=>lines.push(`${i+1}. ${t.title} — ${t.due_date}`));
      lines.push('');
    }
    if(isFirst&&monthTasks.length){
      lines.push(`Oylik vazifalar (${monthTasks.length} ta):`);
      monthTasks.slice(0,5).forEach((t,i)=>lines.push(`${i+1}. ${t.title}`));
      lines.push('');
    }
    const wTask=await APP.db.from('sl_tasks').select('*').eq('section','target').eq('assigned_to',member.email).eq('month',APP.currentMonth).maybeSingle();
    if(wTask.data){let wd={};try{wd=JSON.parse(wTask.data.description||'{}');}catch(e){}if(wd.wish)lines.push(`Maqsad: ${wd.wish}`);if(wd.bonus)lines.push(`Bonus: $${wd.bonus}`);}
    lines.push('');
    lines.push('Muvaffaqiyat!');
    const msg=lines.join('\n');
    const ok=await sendTgMsg(member.telegram_id,msg);
    if(ok)sent++;else failed++;
    await new Promise(r=>setTimeout(r,150));
  }
  alert(`Yuborildi: ${sent} | Xato: ${failed} | TG ID yoq: ${skipped}`);
}

function addDays(dateStr,days){const d=new Date(dateStr);d.setDate(d.getDate()+days);return d.toISOString().slice(0,10);}

async function sendDailyNotifications(){
  const c=runCalc(); const mo=APP.currentMonth;
  let sent=0, failed=0;
  for(const t of APP.team){
    if(!t.telegram_id) continue;
    const br=APP.branches.find(b=>b.id===t.branch_id);
    const plan=br?bmp(br,c,APP.months.indexOf(mo)>=0?APP.months.indexOf(mo):0):{rev:0,units:0};
    const staff=parseInt(br?.staff_count||1);
    const myPlan=plan.rev/staff;
    const msg=`<b>Smartlife — Ежедневный план</b>\n\n👤 ${t.full_name}\n🏪 ${br?.name||'—'}\n📅 ${monthLabel(mo)}\n\n💰 Мой план на месяц: <b>$${Math.round(myPlan).toLocaleString('ru-RU')}</b>\n📆 Дневной план: <b>$${Math.round(myPlan/26).toLocaleString('ru-RU')}</b>\n📱 Продать в месяц: <b>${Math.ceil(plan.units/staff)} шт</b>`;
    const ok=await sendTgMsg(t.telegram_id,msg);

      </div>`).join('')}
    </div>`:`<div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px;margin-bottom:10px;text-align:center;color:rgba(255,255,255,.3);font-size:13px">Bugun vazifa yoq ✓</div>`}

    <!-- FILIALLAR REYTINGI -->
    <div style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:16px;margin-bottom:10px">
      <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:rgba(255,255,255,.3);margin-bottom:12px">🏆 Filiallar reytingi — ${mo}</div>
      ${branchRank.map((b,i)=>{
        const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':''+(i+1)+'.';

}
async function sellerToggleTask(id,done){
  await APP.db.from('sl_tasks').update({status:done?'done':'pending',updated_at:new Date().toISOString()}).eq('id',id);
}

function fmt(n){return Math.round(n||0).toLocaleString('ru-RU');}
function fmtD(n){return '$'+Math.round(n||0).toLocaleString('ru-RU');}
function yyyymm(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function monthLabel(ym){if(!ym)return'';const[y,m]=ym.split('-');return['Yan','Fev','Mar','Apr','May','Iyun','Iyul','Avg','Sen','Okt','Noy','Dek'][parseInt(m)-1]+' '+y;}
function canEdit(){return['ADMIN','TOP_MGR'].includes(APP.user?.role||'');}
function isAdmin(){return APP.user?.role==='ADMIN';}

async function toggleBranchPlan(branchId, makeActive){
  let inactive=[];
  try{inactive=JSON.parse(APP.params.inactive_branches||'[]').map(String);}catch(e){}
  if(makeActive){
    inactive=inactive.filter(id=>id!==String(branchId));
  } else {
    if(!inactive.includes(String(branchId))) inactive.push(String(branchId));
  }
  await saveP('inactive_branches', JSON.stringify(inactive));
  // loadBase reloads branches, then reload section
  await loadBase();
  buildNav();
  loadSection(APP.currentSection);
}
function getBranchMax(){let m={};try{m=JSON.parse(APP.params.branch_max||'{}');}catch(e){}return m;}
async function saveBranchMax(id,val){
  const m=getBranchMax();m[id]=parseFloat(val)||0;
  await saveP('branch_max',JSON.stringify(m));
  // Don't reload - inline edit
}
async function saveSellerMax(teamId,val){
  let sm={};try{sm=JSON.parse(APP.params.seller_max||'{}');}catch(e){}
  sm[teamId]=parseFloat(val)||0;
  await saveP('seller_max',JSON.stringify(sm));
}
function isAdmin(){return APP.user?.role==='ADMIN';}
function roleLabel(r){return{ADMIN:'Admin',TOP_MGR:'Top-menejer',BRANCH_MGR:'Filial menejer',SALES_STAFF:'Sotuvchi',USER:'Kuzatuvchi',COLLECTOR:'Kollektor',CALLCENTER:'Call-markaz'}[r]||r;}
function rColor(r){return{ADMIN:'blue',TOP_MGR:'blue',BRANCH_MGR:'green',SALES_STAFF:'amber',USER:'gray',COLLECTOR:'red',CALLCENTER:'blue'}[r]||'gray';}
function payL(p){return{cash:'Naqd',card:'Karta',installment:'Muddatli',transfer:'O\'tkazma'}[p]||p||'—';}
function kpi(l,v,s,cls){return `<div class="kpi${cls?' '+cls:''}"><div class="kpiL">${l}</div><div class="kpiV">${v}</div>${s?`<div class="kpiS">${s}</div>`:''}</div>`;}
function mSel(){return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><span style="font-size:11px;color:var(--ink3)">Месяц:</span><select style="border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-size:12px;background:var(--bg);outline:none" onchange="APP.currentMonth=this.value;loadSection(APP.currentSection)">${APP.months.map(m=>`<option value="${m}"${m===APP.currentMonth?' selected':''}>${monthLabel(m)}</option>`).join('')}</select></div>`;}
// ══ TG PREVIEW ══
async function openTgPreview(){
  const c=runCalc(); const today=new Date().toISOString().slice(0,10);
  let html='';
  for(const member of APP.team){
    const hasTg=!!member.telegram_id;
    const br=APP.branches.find(b=>b.id===member.branch_id);
    const moIdx=APP.months.indexOf(APP.currentMonth);
    const plan=br?bmp(br,c,moIdx>=0?moIdx:0):{rev:0,units:0};
    const staffCount=parseInt(br?.staff_count||1);
    const myPlan=plan.rev/staffCount;
    const {data:todayTasks}=await APP.db.from('sl_tasks').select('title').eq('assigned_to',member.email).eq('due_date',today).eq('status','pending');

    html+=`<div style="border:1px solid var(--${hasTg?'border':'amber'});border-radius:10px;padding:12px;margin-bottom:10px;${!hasTg?'background:var(--amber-t)':''}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div style="width:32px;height:32px;background:var(--${hasTg?'blue':'amber'});border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700">${(member.full_name||'?')[0]}</div>
        <div>
          <div style="font-weight:700;font-size:13px">${member.full_name}</div>
          <div style="font-size:11px;color:var(--ink3)">${roleLabel(member.role)} · ${br?.name||'Filial yoq'}</div>
        </div>
        ${hasTg
          ?`<span class="badge badge-green" style="margin-left:auto">TG: ${member.telegram_id}</span>`
          :`<span class="badge badge-amber" style="margin-left:auto">TG ID yo'q</span>`}
      </div>
      ${hasTg?`<div style="background:var(--bg);border-radius:8px;padding:10px;font-size:12px;line-height:1.7">
        <div>Bugungi sotuv rejasi: <strong>$${Math.round(myPlan/26).toLocaleString('ru-RU')}</strong></div>
        <div>Oylik reja: <strong>$${Math.round(myPlan).toLocaleString('ru-RU')}</strong></div>
        ${(todayTasks||[]).length?`<div>Bugungi vazifalar: <strong>${(todayTasks||[]).map(t=>t.title).join(', ')}</strong></div>`:'<div style="color:var(--ink3)">Bugun vazifa yoq</div>'}
      </div>`:`<div style="font-size:11px;color:var(--amber)">Bu xodimga xabar yuborilmaydi. Sozlamalarda Telegram ID qo'shing.</div>`}
    </div>`;
  }
  document.getElementById('tgPreviewBody').innerHTML=html||'<div style="text-align:center;padding:20px;color:var(--ink3)">Xodimlar yoq</div>';
  openM('M_tgpreview');
}

// ══ AI ASSISTANT ══
const AI_KEY_PARAM='anthropic_api_key';
let aiHistory=[];

function openAiAssistant(){
  document.getElementById('aiChat').innerHTML=`<div style="text-align:center;padding:20px;color:var(--ink3);font-size:12px">Salom! Men Smartlife platformasidagi malumotlar asosida tahlil qilaman. Savol bering.</div>`;
  aiHistory=[];
  openM('M_ai');
}

function askAi(q){
  document.getElementById('aiInput').value=q;
  sendAiMsg();
}

async function sendAiMsg(){
  const input=document.getElementById('aiInput');
  const q=input.value.trim();
  if(!q) return;
  input.value='';

  const apiKey=APP.params[AI_KEY_PARAM];
  if(!apiKey||apiKey.length<20){
    addAiMsg('ai','Anthropic API kalit topilmadi. Sozlamalar - anthropic_api_key ga kalitingizni kiriting.');
    return;
  }

  addAiMsg('user',q);
  aiHistory.push({role:'user',content:q});
  const loadId='ai_load_'+Date.now();
  addAiMsg('ai','...',loadId);

  // Build context
  const c=runCalc();
  const branchMax=getBranchMax();
  const ctx=`Sen Smartlife kompaniyasi (Uzbekiston, iPhone sotuvi) uchun biznes tahlilchisan.

JORIY MA'LUMOTLAR:
- Maqsadli foyda: $${c.targetProfit.toLocaleString()}/oy
- Maqsadli marja: ${c.targetMargin}%
- O'rtacha chek: $${c.avgCheck}
- Kerakli daromad: $${Math.round(c.netRev).toLocaleString()}/oy
- Kerakli lidlar: ${c.totalLeads.toLocaleString()}/oy
- Do'konga tashrif: ${c.storeVisits.toLocaleString()}/oy
- Rej oylari: ${c.planMonths} (${APP.months.map(m=>m).join(', ')})
- FoT: $${Math.round(c.totalFOT).toLocaleString()}/oy
- Marketing: $${c.mktBudget.toLocaleString()}/oy
- Jamoa: ${APP.team.length} kishi

FILIALLAR:
${APP.branches.map(b=>{
  const max=parseFloat(branchMax[b.id]||0);
  const planM=bmp(b,c,0);
  return `- ${b.name} (${b.city}): ogirlik=${b.weight}, sotuvchi=${b.staff_count}, reja=$${Math.round(planM.rev).toLocaleString()}/oy${max?', maks=$'+Math.round(max).toLocaleString():''}`;
}).join('\n')}

Qisqa, aniq va amaliy javob ber. O'zbek tilida yoz.`;

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-opus-4-5',max_tokens:800,system:ctx,messages:aiHistory})
    });
    const data=await resp.json();
    if(data.error){throw new Error(data.error.message);}
    const reply=data.content?.[0]?.text||'Javob olishda xato';
    aiHistory.push({role:'assistant',content:reply});
    document.getElementById(loadId).textContent=reply;
  }catch(e){
    document.getElementById(loadId).textContent='Xato: '+e.message;
  }
}

function addAiMsg(role,text,id=''){
  const div=document.createElement('div');
  div.id=id;
  div.style.cssText=`max-width:90%;padding:10px 13px;border-radius:10px;font-size:13px;line-height:1.6;white-space:pre-wrap;${
    role==='user'
    ?'align-self:flex-end;background:var(--blue);color:#fff;margin-left:auto'
    :'align-self:flex-start;background:var(--bg);border:1px solid var(--border)'}`;
  div.textContent=text;
  document.getElementById('aiChat').appendChild(div);
  div.scrollIntoView({behavior:'smooth'});
}

function openM(id){document.getElementById(id).classList.add('open');}
function closeM(id){document.getElementById(id).classList.remove('open');}
function toggleSidebar(){
  const sb=document.querySelector('.sidebar');
  const ov=document.getElementById('sidebarOverlay');
  sb.classList.toggle('mobileOpen');
  ov.classList.toggle('show');
}
function closeSidebar(){
  document.querySelector('.sidebar').classList.remove('mobileOpen');
  document.getElementById('sidebarOverlay').classList.remove('show');
}
